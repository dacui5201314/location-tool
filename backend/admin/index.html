<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>址得选 · 管理后台</title>
<style>
:root {
  --bg: #f0f3f8;
  --card: #fff;
  --ink: #1e293b;
  --muted: #64748b;
  --line: #e2e8f0;
  --blue: #315bff;
  --blue-deep: #0b3fbd;
  --navy: #172a8d;
  --red: #dc2626;
  --green: #16a34a;
  --amber: #d97706;
  --radius: 12px;
  --shadow: 0 1px 3px rgba(0,0,0,.06), 0 6px 16px rgba(0,0,0,.04);
}
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif; background:var(--bg); color:var(--ink); min-width:1024px; }
input,button,textarea,select { font:inherit; }
button { cursor:pointer; border:none; }
input,textarea,select { border:1px solid var(--line); border-radius:8px; padding:8px 12px; font-size:14px; width:100%; }
input:focus,textarea:focus,select:focus { outline:none; border-color:var(--blue); box-shadow:0 0 0 3px rgba(49,91,255,.1); }
label { font-size:13px; font-weight:600; color:var(--muted); display:block; margin-bottom:4px; }

/* Login */
.login-wrap { display:flex; align-items:center; justify-content:center; min-height:100vh; background:linear-gradient(135deg,#0b3fbd,#172a8d); }
.login-card { background:#fff; border-radius:16px; padding:48px 40px; width:400px; box-shadow:0 24px 64px rgba(0,0,0,.25); }
.login-card h1 { font-size:24px; font-weight:900; margin-bottom:6px; }
.login-card p { color:var(--muted); font-size:14px; margin-bottom:28px; }
.login-card .err { color:var(--red); font-size:13px; margin-top:12px; }

/* Layout */
.topbar { background:linear-gradient(135deg,#0b3fbd,#151f8f); color:#fff; padding:0 24px; height:56px; display:flex; align-items:center; justify-content:space-between; }
.topbar h2 { font-size:18px; font-weight:900; }
.topbar button { background:rgba(255,255,255,.12); color:#fff; border-radius:8px; padding:6px 16px; font-size:13px; }
.topbar button:hover { background:rgba(255,255,255,.22); }
.layout { display:flex; min-height:calc(100vh - 56px); }
.sidebar { width:200px; background:#fff; border-right:1px solid var(--line); padding:12px 0; flex-shrink:0; }
.sidebar a { display:block; padding:10px 24px; font-size:14px; font-weight:600; color:var(--muted); cursor:pointer; text-decoration:none; border-left:3px solid transparent; transition:all .15s; }
.sidebar a:hover { background:#f8fafc; color:var(--ink); }
.sidebar a.active { color:var(--blue); border-left-color:var(--blue); background:#eef3ff; }
.main { flex:1; padding:24px; overflow-y:auto; }

/* Cards */
.card { background:var(--card); border-radius:var(--radius); padding:24px; box-shadow:var(--shadow); margin-bottom:20px; }
.card h3 { font-size:16px; font-weight:900; margin-bottom:16px; color:var(--ink); }
.card h4 { font-size:14px; font-weight:700; margin-bottom:12px; color:var(--ink); }
.grid2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.grid3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; }
.grid4 { display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:16px; }

/* Stats */
.stat { background:var(--card); border-radius:var(--radius); padding:20px 24px; box-shadow:var(--shadow); }
.stat .num { font-size:32px; font-weight:900; color:var(--blue); }
.stat .lbl { font-size:13px; color:var(--muted); margin-top:4px; }

/* Tables */
table { width:100%; border-collapse:collapse; font-size:13px; }
th { text-align:left; padding:10px 12px; background:#f8fafc; color:var(--muted); font-weight:700; font-size:12px; border-bottom:2px solid var(--line); }
td { padding:10px 12px; border-bottom:1px solid var(--line); }
tr:hover td { background:#f8fafc; }

/* Buttons */
.btn { display:inline-flex;align-items:center;gap:6px; padding:8px 16px; border-radius:8px; font-size:13px; font-weight:700; transition:all .15s; }
.btn-primary { background:var(--blue); color:#fff; }
.btn-primary:hover { background:var(--blue-deep); }
.btn-danger { background:var(--red); color:#fff; }
.btn-danger:hover { background:#b91c1c; }
.btn-outline { background:#fff; color:var(--blue); border:1px solid var(--blue); }
.btn-outline:hover { background:#eef3ff; }
.btn-sm { padding:5px 10px; font-size:12px; }
.btn-xs { padding:3px 8px; font-size:11px; border-radius:6px; }

/* Tags */
.tag { display:inline-block; padding:2px 8px; border-radius:999px; font-size:11px; font-weight:700; }
.tag-green { background:#dcfce7; color:#166534; }
.tag-red { background:#fef2f2; color:#991b1b; }
.tag-blue { background:#eef3ff; color:#315bff; }
.tag-amber { background:#fffbeb; color:#92400e; }

/* Toast */
.toast { position:fixed; top:20px; right:20px; z-index:9999; padding:12px 24px; border-radius:10px; font-size:14px; font-weight:700; color:#fff; animation:fadeIn .3s; box-shadow:0 8px 24px rgba(0,0,0,.2); }
.toast-ok { background:#16a34a; }
.toast-err { background:#dc2626; }
@keyframes fadeIn { from{opacity:0;transform:translateY(-10px)} to{opacity:1;transform:translateY(0)} }

/* Form */
.form-row { display:flex; gap:12px; align-items:flex-end; }
.form-row > div { flex:1; }
.form-group { margin-bottom:14px; }
.inline-label { display:flex; align-items:center; gap:8px; font-size:14px; }

/* Modal */
.modal-overlay { position:fixed; inset:0; background:rgba(15,23,42,.5); z-index:1000; display:flex; align-items:center; justify-content:center; }
.modal-box { background:#fff; border-radius:16px; padding:32px; width:480px; max-height:80vh; overflow-y:auto; box-shadow:0 24px 64px rgba(0,0,0,.3); }
.modal-box h3 { margin-bottom:16px; }

/* Hidden */
.hidden { display:none !important; }
.mb { margin-bottom:16px; }
.mt { margin-top:16px; }
.flex-between { display:flex; justify-content:space-between; align-items:center; }
.text-sm { font-size:13px; color:var(--muted); }
.text-xs { font-size:12px; color:var(--muted); }
.badge { display:inline-flex;align-items:center;justify-content:center;min-width:20px;height:20px;border-radius:999px;background:var(--red);color:#fff;font-size:11px;font-weight:900;padding:0 6px;margin-left:6px; }
</style>
</head>
<body>

<!-- Login -->
<div id="loginPage" class="login-wrap">
  <div class="login-card">
    <h1>址得选</h1>
    <p>AI 选址分析平台 · 管理后台</p>
    <div class="form-group">
      <label>管理员密码</label>
      <input id="loginPwd" type="password" placeholder="请输入管理后台密码" onkeydown="if(event.key==='Enter')login()">
    </div>
    <button class="btn btn-primary" style="width:100%;justify-content:center;padding:10px" onclick="login()">登 录</button>
    <div id="loginErr" class="err hidden"></div>
  </div>
</div>

<!-- Main -->
<div id="mainPage" class="hidden">
  <div class="topbar">
    <h2>址得选 管理后台</h2>
    <div style="display:flex;align-items:center;gap:16px">
      <span style="font-size:13px;opacity:.7">v1.12.0</span>
      <button onclick="logout()">退出登录</button>
    </div>
  </div>
  <div class="layout">
    <div class="sidebar">
      <a data-page="dashboard" class="active" onclick="navTo('dashboard')">📊 仪表盘</a>
      <a data-page="users" onclick="navTo('users')">👥 用户管理</a>
      <a data-page="keys" onclick="navTo('keys')">🗝️ Key 池管理</a>
      <a data-page="skus" onclick="navTo('skus')">💳 SKU 管理</a>
      <a data-page="uiconfig" onclick="navTo('uiconfig')">🎨 UI 配置</a>
      <a data-page="industries" onclick="navTo('industries')">🏪 业态管理</a>
      <a data-page="cdk" onclick="navTo('cdk')">🎫 CDK 生成</a>
      <a data-page="settings" onclick="navTo('settings')">⚙️ 系统设置</a>
    </div>
    <div class="main" id="content"></div>
  </div>
</div>

<script>
// ── State ──
let token = '';
const API = '';

function af(method, path, body) {
  const headers = { 'Content-Type':'application/json' };
  if (token) headers['Authorization'] = 'Bearer ' + token;
  return fetch(API + path, { method, headers, body: body ? JSON.stringify(body) : undefined })
    .then(r => r.json().then(d => ({ ok: r.ok, status: r.status, data: d })))
    .catch(e => ({ ok: false, error: e.message }));
}

// ── Toast ──
function toast(msg, ok) {
  const t = document.createElement('div');
  t.className = 'toast ' + (ok ? 'toast-ok' : 'toast-err');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2800);
}

// ── Login ──
async function login() {
  const pwd = document.getElementById('loginPwd').value;
  if (!pwd) { document.getElementById('loginErr').textContent = '请输入密码'; document.getElementById('loginErr').classList.remove('hidden'); return; }
  const r = await af('POST', '/api/admin/login', { password: pwd });
  if (!r.ok) {
    document.getElementById('loginErr').textContent = r.data?.detail || '登录失败';
    document.getElementById('loginErr').classList.remove('hidden');
    return;
  }
  token = r.data.token;
  localStorage.setItem('zdx_admin_token', token);
  document.getElementById('loginPage').classList.add('hidden');
  document.getElementById('mainPage').classList.remove('hidden');
  navTo('dashboard');
}

function logout() {
  token = '';
  localStorage.removeItem('zdx_admin_token');
  document.getElementById('loginPage').classList.remove('hidden');
  document.getElementById('mainPage').classList.add('hidden');
}

// Auto-login
(function() {
  const t = localStorage.getItem('zdx_admin_token');
  if (t) { token = t;
    document.getElementById('loginPage').classList.add('hidden');
    document.getElementById('mainPage').classList.remove('hidden');
    navTo('dashboard');
  }
})();

// ── Nav ──
async function navTo(page) {
  document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
  document.querySelector(`[data-page="${page}"]`)?.classList.add('active');
  const c = document.getElementById('content');
  switch(page) {
    case 'dashboard': c.innerHTML = await renderDashboard(); break;
    case 'users': c.innerHTML = renderUsers(); await loadUsers(); break;
    case 'keys': c.innerHTML = renderKeys(); await loadKeys(); break;
    case 'skus': c.innerHTML = renderSkus(); await loadSkus(); break;
    case 'uiconfig': c.innerHTML = renderUiConfig(); await loadUiConfig(); break;
    case 'industries': c.innerHTML = renderIndustries(); await loadIndustries(); break;
    case 'cdk': c.innerHTML = renderCdk(); break;
    case 'settings': c.innerHTML = renderSettings(); await loadSettings(); break;
  }
}

// ── Dashboard ──
async function renderDashboard() {
  const r = await af('GET', '/api/admin/stats');
  const s = r.ok ? r.data : {};
  return `<div class="grid4 mb">${stat('总用户', s.total_users || 0)}${stat('总记录', s.total_records || 0)}${stat('今日分析', s.today_analyzes || 0)}${stat('活跃业态', s.active_industries || 0)}</div>
    <div class="card"><h3>快速操作</h3><div style="display:flex;gap:12px;flex-wrap:wrap">${qlink('users','👥 用户管理')}${qlink('keys','🗝️ Key 池')}${qlink('skus','💳 套餐管理')}${qlink('cdk','🎫 生成 CDK')}${qlink('settings','⚙️ 系统设置')}</div></div>`;
}
function stat(l, n) { return `<div class="stat"><div class="num">${n}</div><div class="lbl">${l}</div></div>`; }
function qlink(p, t) { return `<button class="btn btn-outline" onclick="navTo('${p}')">${t}</button>`; }

// ── Users ──
function renderUsers() { return `<div class="card"><div class="flex-between mb"><h3>用户列表</h3><div style="display:flex;gap:8px"><input id="userSearch" placeholder="搜索手机号..." style="width:200px" oninput="loadUsers()"><button class="btn btn-outline btn-sm" onclick="loadUsers()">刷新</button></div></div><table><thead><tr><th>ID</th><th>手机号</th><th>昵称</th><th>余额</th><th>会员</th><th>注册时间</th><th>操作</th></tr></thead><tbody id="userTbody"></tbody></table></div>`; }
async function loadUsers() {
  const q = document.getElementById('userSearch')?.value || '';
  const r = await af('GET', '/api/admin/users?search=' + encodeURIComponent(q));
  const users = r.ok ? (r.data.users || []) : [];
  document.getElementById('userTbody').innerHTML = users.map(u => `<tr>
    <td>${u.id}</td><td>${u.phone_number || u.phone || '-'}</td><td>${u.nickname || '-'}</td>
    <td>${u.balance_credits || 0}</td><td><span class="tag ${u.membership_tier&&u.membership_tier!=='free'?'tag-green':'tag-amber'}">${u.membership_tier||'free'}</span></td>
    <td>${(u.created_at||'').slice(0,10)}</td>
    <td><button class="btn btn-primary btn-xs" onclick="addCredits(${u.id})">加余额</button></td></tr>`).join('');
}
async function addCredits(uid) {
  const amt = prompt('增加点数：', '10');
  if (!amt) return;
  const r = await af('POST', `/api/admin/users/${uid}/add-credits`, { amount: parseInt(amt), reason: '管理后台手动充值' });
  toast(r.ok ? '充值成功' : (r.data?.detail || '失败'), r.ok);
  if (r.ok) loadUsers();
}

// ── Key Pool ──
function renderKeys() { return `<div class="card"><div class="flex-between mb"><h3>高德 Key 池</h3><button class="btn btn-primary btn-sm" onclick="showKeyForm()">+ 添加 Key</button></div><table><thead><tr><th>名称</th><th>Key</th><th>密钥</th><th>状态</th><th>优先级</th><th>失败次数</th><th>最后状态</th><th>操作</th></tr></thead><tbody id="keyTbody"></tbody></table></div>`; }
async function loadKeys() {
  const r = await af('GET', '/api/admin/amap-keys');
  const keys = r.ok ? (r.data || []) : [];
  document.getElementById('keyTbody').innerHTML = keys.map(k => `<tr>
    <td>${k.name||'-'}</td><td style="font-family:monospace;font-size:12px">${(k.api_key||'').slice(0,16)}...</td><td>${k.security_secret?'已设':'-'}</td>
    <td><span class="tag ${k.enabled?'tag-green':'tag-red'}">${k.enabled?'启用':'禁用'}</span></td>
    <td>${k.priority||0}</td><td>${k.fail_count||0}</td><td>${k.last_status||'-'}</td>
    <td>
      <button class="btn btn-outline btn-xs" onclick="testKey(${k.id})">测试</button>
      <button class="btn btn-outline btn-xs" onclick="editKey(${k.id})">编辑</button>
      <button class="btn btn-danger btn-xs" onclick="deleteKey(${k.id})">删除</button>
    </td></tr>`).join('');
}
function showKeyForm(edit) {
  const d = edit || {};
  const box = document.createElement('div'); box.className='modal-overlay';
  box.innerHTML = `<div class="modal-box"><h3>${edit?'编辑':'添加'} Key</h3>
    <div class="form-group"><label>名称</label><input id="kf_name" value="${d.name||''}"></div>
    <div class="form-group"><label>API Key</label><input id="kf_key" value="${d.api_key||''}"></div>
    <div class="form-group"><label>安全密钥</label><input id="kf_sec" value="${d.security_secret||''}"></div>
    <div class="form-row"><div class="form-group"><label>优先级</label><input id="kf_pri" type="number" value="${d.priority||0}"></div>
    <div class="form-group"><label class="inline-label"><input id="kf_enabled" type="checkbox" ${d.enabled!==false?'checked':''} style="width:auto"> 启用</label></div></div>
    <div style="display:flex;gap:8px;margin-top:16px"><button class="btn btn-primary" id="kfSave">保存</button><button class="btn btn-outline" onclick="this.closest('.modal-overlay').remove()">取消</button></div></div>`;
  document.body.appendChild(box);
  box.querySelector('#kfSave').onclick = async () => {
    const body = { name: qv('kf_name'), api_key: qv('kf_key'), security_secret: qv('kf_sec'), priority: parseInt(qv('kf_pri'))||0, enabled: document.getElementById('kf_enabled').checked };
    let r;
    if (edit) r = await af('PUT', `/api/admin/amap-keys/${edit.id}`, body);
    else r = await af('POST', '/api/admin/amap-keys', body);
    toast(r.ok ? '保存成功' : (r.data?.detail||'失败'), r.ok);
    if (r.ok) { box.remove(); loadKeys(); }
  };
}
function editKey(id) { af('GET','/api/admin/amap-keys').then(r => { const k = (r.data||[]).find(x=>x.id===id); if(k) showKeyForm(k); }); }
async function deleteKey(id) { if(!confirm('确定删除？'))return; const r=await af('DELETE',`/api/admin/amap-keys/${id}`); toast(r.ok?'已删除':(r.data?.detail||'失败'),r.ok); if(r.ok)loadKeys(); }
async function testKey(id) { const r=await af('POST',`/api/admin/amap-keys/${id}/test`); toast(r.ok?'连通正常':(r.data?.info||'测试失败'),r.ok); }
function qv(id) { return document.getElementById(id)?.value || ''; }

// ── SKUs ──
function renderSkus() { return `<div class="card"><div class="flex-between mb"><h3>套餐与点数包</h3><button class="btn btn-primary btn-sm" onclick="addSku()">+ 添加</button></div><div id="skuList"></div></div>`; }
async function loadSkus() {
  const r = await af('GET', '/api/admin/skus');
  const skus = r.ok ? (r.data.skus || r.data || []) : [];
  document.getElementById('skuList').innerHTML = skus.map((s,i) => `<div class="card" style="border:1px solid var(--line);box-shadow:none">
    <div class="flex-between"><div><span class="tag ${s.type==='membership'?'tag-blue':'tag-green'}">${s.type==='membership'?'会员':'点数'}</span> <b>${s.label}</b> ${s.badge?`<span class="tag tag-amber">${s.badge}</span>`:''}</div>
    <div><button class="btn btn-outline btn-xs" onclick="editSku(${i})">编辑</button><button class="btn btn-danger btn-xs" onclick="deleteSku(${i})">删除</button></div></div>
    <div class="text-sm mt">¥${s.price} · ${s.credits}点 · ${s.duration_days||0}天 · ${s.desc||''} · ${s.visible?'显示':'隐藏'}</div></div>`).join('') + `<button class="btn btn-primary mt" onclick="saveSkus()">💾 保存全部</button>`;
  window._skus = skus;
}
function addSku() { window._skus.push({ id:Date.now(), type:'points', label:'新套餐', price:'0', credits:1, tier:'', duration_days:0, badge:'', desc:'', visible:true }); renderSkuList(); }
function editSku(i) {
  const s = window._skus[i];
  const box = document.createElement('div'); box.className='modal-overlay';
  box.innerHTML = `<div class="modal-box"><h3>编辑 SKU</h3>
    <div class="form-row"><div class="form-group"><label>类型</label><select id="sf_type"><option value="membership" ${s.type==='membership'?'selected':''}>会员</option><option value="points" ${s.type==='points'?'selected':''}>点数</option></select></div>
    <div class="form-group"><label>名称</label><input id="sf_label" value="${s.label}"></div></div>
    <div class="form-row"><div class="form-group"><label>价格(元)</label><input id="sf_price" value="${s.price}"></div>
    <div class="form-group"><label>点数</label><input id="sf_credits" type="number" value="${s.credits}"></div></div>
    <div class="form-row"><div class="form-group"><label>天数</label><input id="sf_days" type="number" value="${s.duration_days||0}"></div>
    <div class="form-group"><label>徽章</label><input id="sf_badge" value="${s.badge||''}"></div></div>
    <div class="form-group"><label>描述</label><input id="sf_desc" value="${s.desc||''}"></div>
    <div class="form-group"><label class="inline-label"><input id="sf_visible" type="checkbox" ${s.visible!==false?'checked':''} style="width:auto"> 显示</label></div>
    <div style="display:flex;gap:8px;margin-top:16px"><button class="btn btn-primary" id="sfSave">保存</button><button class="btn btn-outline" onclick="this.closest('.modal-overlay').remove()">取消</button></div></div>`;
  document.body.appendChild(box);
  box.querySelector('#sfSave').onclick = () => {
    Object.assign(window._skus[i], { type:qv('sf_type'), label:qv('sf_label'), price:qv('sf_price'), credits:parseInt(qv('sf_credits'))||0, duration_days:parseInt(qv('sf_days'))||0, badge:qv('sf_badge'), desc:qv('sf_desc'), visible:document.getElementById('sf_visible').checked });
    box.remove(); renderSkuList();
  };
}
function deleteSku(i) { if(!confirm('删除？'))return; window._skus.splice(i,1); renderSkuList(); }
function renderSkuList() { document.getElementById('skuList').innerHTML = window._skus.map((s,i) => `<div class="card" style="border:1px solid var(--line);box-shadow:none"><div class="flex-between"><div><span class="tag ${s.type==='membership'?'tag-blue':'tag-green'}">${s.type==='membership'?'会员':'点数'}</span> <b>${s.label}</b> ${s.badge?`<span class="tag tag-amber">${s.badge}</span>`:''}</div><div><button class="btn btn-outline btn-xs" onclick="editSku(${i})">编辑</button><button class="btn btn-danger btn-xs" onclick="deleteSku(${i})">删除</button></div></div><div class="text-sm mt">¥${s.price} · ${s.credits}点 · ${s.duration_days||0}天 · ${s.desc||''} · ${s.visible?'显示':'隐藏'}</div></div>`).join('') + `<button class="btn btn-primary mt" onclick="saveSkus()">💾 保存全部</button>`; }
async function saveSkus() { const r = await af('PUT', '/api/admin/skus', window._skus); toast(r.ok ? '已保存' : (r.data?.detail||'失败'), r.ok); if(r.ok) loadSkus(); }

// ── UI Config ──
function renderUiConfig() { return `<div class="card"><div class="flex-between mb"><h3>UI 客服配置</h3><button class="btn btn-primary btn-sm" onclick="saveUiConfig()">保存</button></div>
  <div class="form-group"><label>全局公告</label><input id="uic_ann" placeholder="留空则隐藏"></div>
  <div class="grid3"><div class="form-group"><label>客服名称</label><input id="uic_name"></div>
  <div class="form-group"><label>客服微信号</label><input id="uic_wx"></div>
  <div class="form-group"><label>客服电话</label><input id="uic_phone"></div></div></div>`; }
async function loadUiConfig() {
  const r = await af('GET', '/api/admin/ui-config');
  if (r.ok) { const d = r.data; document.getElementById('uic_ann').value = d.announcement||''; document.getElementById('uic_name').value = d.customer_service_name||''; document.getElementById('uic_wx').value = d.cs_wechat||''; document.getElementById('uic_phone').value = d.cs_phone||''; }
}
async function saveUiConfig() { const r = await af('PUT', '/api/admin/ui-config', { announcement: qv('uic_ann'), customer_service_name: qv('uic_name'), cs_wechat: qv('uic_wx'), cs_phone: qv('uic_phone') }); toast(r.ok ? '已保存' : (r.data?.detail||'失败'), r.ok); }

// ── Industries ──
function renderIndustries() { return `<div class="card"><h3>业态列表</h3><div id="indList"></div></div>`; }
async function loadIndustries() { const r = await af('GET', '/api/industries/active'); const inds = r.ok ? (r.data.industries || []) : []; document.getElementById('indList').innerHTML = `<table><thead><tr><th>名称</th><th>Config Key</th><th>状态</th></tr></thead><tbody>${inds.map(i => `<tr><td>${i.name}</td><td style="font-family:monospace;font-size:12px">${i.config_key||'-'}</td><td><span class="tag ${i.is_active?'tag-green':'tag-red'}">${i.is_active?'启用':'禁用'}</span></td></tr>`).join('')}</tbody></table>`; }

// ── CDK ──
function renderCdk() { return `<div class="card"><h3>批量生成兑换码</h3>
  <div class="grid3 mb"><div class="form-group"><label>生成数量</label><input id="cdk_count" type="number" value="10"></div>
  <div class="form-group"><label>每个点数</label><input id="cdk_credits" type="number" value="5"></div>
  <div class="form-group"><label>有效期(天)</label><input id="cdk_days" type="number" value="365"></div></div>
  <button class="btn btn-primary" onclick="genCdk()">生成兑换码</button>
  <div id="cdkResult" class="mt"></div></div>`; }
async function genCdk() {
  const r = await af('POST', '/api/admin/cdk/generate', { count: parseInt(qv('cdk_count'))||10, credits: parseInt(qv('cdk_credits'))||5, days: parseInt(qv('cdk_days'))||365 });
  if (!r.ok) { toast(r.data?.detail||'生成失败', false); return; }
  const codes = r.data.codes || [];
  document.getElementById('cdkResult').innerHTML = `<h4>已生成 ${codes.length} 个兑换码</h4>
    <textarea style="height:200px;font-family:monospace;font-size:13px" readonly>${codes.join('\n')}</textarea>
    <button class="btn btn-outline btn-sm mt" onclick="navigator.clipboard.writeText(this.previousElementSibling.value);toast('已复制',true)">📋 复制全部</button>`;
}

// ── Settings ──
function renderSettings() { return `<div class="card"><div class="flex-between mb"><h3>系统设置</h3><button class="btn btn-primary btn-sm" onclick="saveSettings()">保存</button></div>
  <h4>微信支付</h4><div class="grid2 mb"><div class="form-group"><label>商户号 MCH ID</label><input id="ss_mchid"></div>
  <div class="form-group"><label>小程序 AppID</label><input id="ss_wxappid"></div>
  <div class="form-group"><label>API v3 Key</label><input id="ss_wxkey" type="password"></div>
  <div class="form-group"><label>证书序列号</label><input id="ss_certsn"></div></div>
  <div class="form-group"><label>商户私钥 PEM</label><textarea id="ss_privkey" rows="4" style="font-family:monospace;font-size:12px"></textarea></div>
  <div class="form-group"><label>平台证书 PEM</label><textarea id="ss_platcert" rows="4" style="font-family:monospace;font-size:12px"></textarea></div>
  <h4 class="mt">大模型</h4><div class="grid2"><div class="form-group"><label>Provider</label><input id="ss_ai_prov"></div>
  <div class="form-group"><label>API Key</label><input id="ss_ai_key" type="password"></div></div>
  <h4 class="mt">注册奖励</h4><div class="grid2"><div class="form-group"><label>赠送点数</label><input id="ss_bonus" type="number"></div>
  <div class="form-group"><label>免费点数</label><input id="ss_free" type="number"></div></div></div>`; }
async function loadSettings() {
  const r = await af('GET', '/api/admin/system-settings');
  if (!r.ok) return;
  const d = r.data || {};
  setVal('ss_mchid', d.wx_mch_id); setVal('ss_wxappid', d.wx_app_id); setVal('ss_wxkey', d.wx_api_key);
  setVal('ss_certsn', d.wx_cert_sn); setVal('ss_privkey', d.wx_private_key_pem); setVal('ss_platcert', d.wx_platform_cert_pem);
  setVal('ss_ai_prov', d.ai_provider); setVal('ss_ai_key', d.ai_key);
  setVal('ss_bonus', d.register_bonus); setVal('ss_free', d.register_free);
}
function setVal(id, v) { if (v !== undefined && v !== null) document.getElementById(id).value = v; }
async function saveSettings() {
  const r = await af('PUT', '/api/admin/system-settings', {
    wx_mch_id: qv('ss_mchid'), wx_app_id: qv('ss_wxappid'), wx_api_key: qv('ss_wxkey'),
    wx_cert_sn: qv('ss_certsn'), wx_private_key_pem: qv('ss_privkey'), wx_platform_cert_pem: qv('ss_platcert'),
    ai_provider: qv('ss_ai_prov'), ai_key: qv('ss_ai_key'),
    register_bonus: qv('ss_bonus'), register_free: qv('ss_free')
  });
  toast(r.ok ? '已保存' : (r.data?.detail||'失败'), r.ok);
}
</script>
</body>
</html>
